   安芸太田新聞：毎日6:00(JST)を境に「その日の版」を自動生成してキャッシュする。
   仕組み：
   1) 現在時刻(JST)から「版の日付」を決める（6:00より前なら前日の版）
   2) window.storage(shared) に edition:YYYY-MM-DD があればそれを表示
   3) 無ければ Anthropic API (web_search 付き) を呼び、その日の記事一式を
      JSON で生成させ、shared storage に保存してから表示する
   4) 画像は生成のたびにURLが変わって壊れると困るので、カテゴリ毎に
      固定の安定画像（Picsum Photos／実在の写真配信サービス）を使う。
      ※実際の事件・人物の報道写真そのものではなく「資料写真」です。
   注意：この仕組みは「誰かがページを開いたタイミング」で動く方式です。
   サーバー側で完全に無人・定時実行したい場合は、Claude Cowork の
   スケジュールタスク機能（Desktopアプリ／Pro以上）等、別の仕組みが必要です。
   ========================================================================= */

const IMG = {

function jstNow(){
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset()*60000;
  return new Date(utc + 9*3600000);
}
function editionDateFor(d){
  const dd = new Date(d);
  if(dd.getHours() < 6){ dd.setDate(dd.getDate()-1); }
  const y=dd.getFullYear(), m=String(dd.getMonth()+1).padStart(2,'0'), day=String(dd.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtJP(dateStr){
  const [y,m,d]=dateStr.split('-').map(Number);
  const wd=['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];
  return `${y}年（令和${y-2018}年）${m}月${d}日（${wd}）朝刊`;
}

async function callClaudeForEdition(dateStr){
  const sys = `あなたは「安芸太田新聞」というローカル新聞の編集AIです。広島県安芸太田町を中心とした地域紙の${dateStr}朝刊を作成してください。
【絶対厳守】
- web_search ツールで実際に確認できた事実だけを書く。分からないことは書かない、断定しない。
- すべての事実に日付を明記する（例：「7月13日、〜と報じられた」）。数日前の話を今日のニュースのように書かない。
- スポーツ（カープ・サンフレッチェ・大谷翔平など）は必ず発表日・報道日を併記した「短信」として扱う。

- 元カープ選手の指定薬物事件（羽月隆太郎氏関連）について新しい報道があれば「クローズアップ・ウォッチ」として時系列でまとめる。他選手への言及は「本人の発言として報じられた」等、伝聞であることを明確にする。新しい進展がなければ「続報なし」と書く。
- 出力は必ず次のJSON形式のみ。前置き・説明・コードブロック記号は一切付けない。
{
 "date":"${dateStr}",
 "top":{"eyebrow":"","headlineHtml":"","deck":"","body":["",""],"sourceNote":"","photoCap":"","flash":[["",""]]},
 "column":{"title":"","body":["",""]},

 "briefs":[["見出し","本文","日付情報"]],
 "weather":{"summary":"","high":"","low":"","uv":"","note":""}
}`;

 const res = await fetch("https://soft-violet-9a9a.ttg0117.workers.dev/", {
            method: "POST",

            body: JSON.stringify({
                contents: [{
                    parts: [{ text: `${dateStr}の広島県安芸太田町周辺のニュースや天気をGoogle検索で調べて、指定された新聞のJSON形式で1つだけ完全なデータを生成してください。` }]
                }],
                tools: [{ googleSearch: {} }] // Google検索を使って最新ニュースを掴む設定
            })
        });

        const data = await res.json();
        // Geminiの返答テキストからJSON部分を抽出
        const textBlock = data.candidates[0].content.parts[0].text || "";
        const cleaned = textBlock.replace(/```json\n/g, "").replace(/```/g, "").trim();
        const jsonStart = cleaned.indexOf('{');
        const jsonEnd = cleaned.lastIndexOf('}');
        return JSON.parse(cleaned.slice(jsonStart, jsonEnd + 1));

async function boot(force){
  const statusBar = document.getElementById('statusBar');
  const statusText = document.getElementById('statusText');
  const editionDate = editionDateFor(jstNow());
  const key = `edition:${editionDate}`;

  statusBar.classList.add('loading');

  try{
    if(!force){
      try{
        const cached = await window.storage.get(key, true);
        if(cached && cached.value){
          const data = JSON.parse(cached.value);
          render(data);
          statusText.textContent = `${editionDate} 版を表示中（キャッシュ済み）`;
          statusBar.classList.remove('loading');
          return;
        }
      }catch(e){ /* キー無し。新規生成へ */ }
    }

    // 7/14はあらかじめ用意した版を採用（初回体験・API未接続環境向けフォールバック）
    if(editionDate === SEED_EDITION.date && !force){
      render(SEED_EDITION);
      try{ await window.storage.set(key, JSON.stringify(SEED_EDITION), true); }catch(e){}
      statusText.textContent = `${editionDate} 版を表示中`;
      statusBar.classList.remove('loading');
      return;
    }

    statusText.textContent = `${editionDate} 版を生成中…（web検索しながら記事を書いています）`;
    const fresh = await callClaudeForEdition(editionDate);
    render(fresh);
    try{ await window.storage.set(key, JSON.stringify(fresh), true); }catch(e){}
    statusText.textContent = `${editionDate} 版を表示中（自動生成）`;
  }catch(err){
    console.error(err);
    render(SEED_EDITION);
    statusText.textContent = `最新版の自動生成に失敗したため、直近のキャッシュ版を表示しています`;
  }
  statusBar.classList.remove('loading');
}

document.getElementById('regenBtn').addEventListener('click', ()=>boot(true));
boot(false);
</script>
