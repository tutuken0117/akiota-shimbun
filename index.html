<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>安芸太田新聞｜リアルタイム生成</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

  :root{
    --ink:#1a1a1a; --red:#a6001a; --paper:#f4f0e6; --gray:#666; --box:#fbf9f2;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:#4d4a42; font-family:"Noto Serif JP", serif; color:var(--ink); }
  .paper{ max-width:1180px; margin:24px auto; background:var(--paper);
    box-shadow:0 0 0 1px #00000022, 0 18px 50px rgba(0,0,0,0.45); padding:20px 30px 30px; }
  @media print{ body{background:#fff;} .paper{box-shadow:none;margin:0;max-width:100%;} }

  .masthead{ display:grid; grid-template-columns:1fr auto; align-items:start; gap:16px;
    padding-bottom:8px; border-bottom:5px solid var(--ink); }
  .masthead-left{ font-family:"Noto Sans JP",sans-serif; font-size:11px; line-height:1.8; color:#444; padding-top:6px; }
  .masthead-left .edition{ font-weight:900; font-size:13px; color:var(--red); }
  .masthead-right{ text-align:right; }
  .title-jp{ margin:0; font-weight:900; font-size:46px; letter-spacing:4px; color:var(--ink); line-height:1; }
  .title-jp .accent{ color:var(--red); }
  .subline{ font-family:"Noto Sans JP",sans-serif; font-size:10.5px; letter-spacing:2px; color:#555; margin-top:4px; }

  .policy-strip{ font-family:"Noto Sans JP",sans-serif; font-size:10.5px; color:#555;
    display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;
    border-bottom:1px solid #999; padding:5px 2px 6px; margin-bottom:14px; }
  .policy-strip b{ color:var(--red); }

  .status-bar{
    font-family:"Noto Sans JP",sans-serif; font-size:11px; color:#555;
    background:#fff; border:1px dashed #aaa; padding:6px 10px; margin-bottom:12px;
    display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .status-bar .dot{ width:8px;height:8px;border-radius:50%; background:#2e8b57; display:inline-block; margin-right:6px; }
  .status-bar.loading .dot{ background:#c9a227; }
  
  .key-config-box { display: flex; align-items: center; gap: 8px; font-family:"Noto Sans JP",sans-serif; }
  .key-config-box input { font-size: 11px; padding: 3px 6px; width: 220px; border: 1px solid #ccc; }
  .status-bar button{
    font-family:"Noto Sans JP",sans-serif; font-size:10.5px; border:1px solid var(--ink);
    background:#fff; padding:3px 10px; cursor:pointer;
  }

  .top-story{ display:grid; grid-template-columns:1.5fr 1fr; gap:22px;
    border-bottom:3px double var(--ink); padding-bottom:18px; margin-bottom:16px; }
  .eyebrow{ font-family:"Noto Sans JP",sans-serif; display:inline-block; font-size:12px; font-weight:700;
    border:1.5px solid var(--red); color:var(--red); padding:2px 8px; margin-bottom:8px; }
  .headline{ font-size:32px; font-weight:900; line-height:1.35; margin:0 0 6px; }
  .headline .under{ text-decoration:underline; text-decoration-thickness:2px; text-underline-offset:4px; }
  .deck{ font-family:"Noto Sans JP",sans-serif; font-size:14.5px; font-weight:700; color:#333;
    margin:4px 0 12px; padding-left:10px; border-left:4px solid var(--red); }
  .body-cols{ column-count:2; column-gap:22px; font-size:14.5px; line-height:2.0; text-align:justify; }
  .body-cols p{ margin:0 0 10px; }
  .drop-cap::first-letter{ font-size:40px; font-weight:900; float:left; line-height:0.8; padding-right:6px; color:var(--red); }
  .source-note{ font-family:"Noto Sans JP",sans-serif; font-size:10.5px; color:var(--gray); text-align:right; margin-top:6px; }

  .top-photo-col{ display:flex; flex-direction:column; gap:10px; }
  .photo-frame{ border:2px solid var(--ink); background:#ddd; min-height:220px; }
  .photo-frame img{ width:100%; height:220px; object-fit:cover; display:block; }
  .photo-cap{ font-family:"Noto Sans JP",sans-serif; font-size:11.5px; color:#333; background:#fff;
    border:1px solid var(--ink); border-top:none; padding:6px 8px; line-height:1.6; }
  .photo-cap b{ color:var(--red); }

  .flash-box{ border:2px solid var(--ink); background:var(--box); padding:10px 12px; font-family:"Noto Sans JP",sans-serif; }
  .flash-box h4{ margin:0 0 6px; font-size:12.5px; letter-spacing:1px; }
  .flash-box h4 .tag{ background:var(--red); color:#fff; padding:2px 6px; margin-right:6px; }
  .flash-box ul{ margin:0; padding-left:16px; font-size:12px; line-height:1.9; }
  .flash-box li{ margin-bottom:2px; }
  .flash-box .dt{ color:var(--gray); font-size:10.5px; }

  .column-section{ border:3px solid var(--ink); margin-bottom:18px; background:var(--box); }
  .column-header{ background:var(--ink); color:#fff; padding:8px 16px; display:flex; align-items:center;
    justify-content:space-between; font-family:"Noto Sans JP",sans-serif; }
  .column-header .name{ font-weight:900; font-size:16px; letter-spacing:2px; }
  .column-header .byline{ font-size:11px; color:#ddd; }
  .column-body{ display:grid; grid-template-columns:1fr auto; gap:18px; padding:16px 18px; }
  .column-body h3{ font-size:21px; margin:0 0 8px; font-weight:900; line-height:1.4; }
  .column-body p{ font-family:"Noto Sans JP",sans-serif; font-size:13.5px; line-height:2.0; text-align:justify; margin:0 0 10px; }
  .column-tagbox{ font-family:"Noto Sans JP",sans-serif; font-size:11px; color:#555; border-left:3px solid var(--ink);
    padding:6px 10px; background:#fff; max-width:200px; height:fit-content; line-height:1.8; }
  .column-tagbox b{ display:block; color:var(--red); font-size:12px; margin-bottom:4px; }
  .column-sign{ font-family:"Noto Sans JP",sans-serif; font-size:11px; color:var(--gray); text-align:right; padding:0 18px 12px; }

  .watch-section{ border:2px solid var(--ink); margin-bottom:18px; background:#fff; }
  .watch-header{ background:#2c2c2c; color:#fff; padding:7px 14px; display:flex; justify-content:space-between;
    align-items:center; font-family:"Noto Sans JP",sans-serif; }
  .watch-header .name{ font-weight:900; font-size:14px; letter-spacing:1px; }
  .watch-header .badge{ background:var(--red); font-size:10px; padding:2px 6px; }
  .watch-body{ display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:14px 16px; font-family:"Noto Sans JP",sans-serif; }
  .watch-body h4{ font-size:14.5px; margin:0 0 6px; }
  .watch-body p{ font-size:12.5px; line-height:1.9; margin:0 0 8px; text-align:justify; }
  .watch-timeline{ font-size:11.5px; line-height:1.9; }
  .watch-timeline .t-item{ display:flex; gap:8px; margin-bottom:4px; }
  .watch-timeline .t-date{ color:var(--red); font-weight:700; white-space:nowrap; }
  .watch-note{ grid-column:1/-1; font-size:10.5px; color:var(--gray); border-top:1px dashed #ccc; padding-top:8px; margin-top:2px; }

  .bottom-grid{ display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:20px; }
  .briefs h3,.weather-box h3,.notice-box h3{ font-family:"Noto Sans JP",sans-serif; font-size:13px; font-weight:900;
    margin:0 0 8px; border-bottom:2px solid var(--ink); padding-bottom:4px; letter-spacing:1px; }
  .briefs .item{ font-family:"Noto Sans JP",sans-serif; font-size:12px; line-height:1.85; margin-bottom:10px;
    padding-bottom:8px; border-bottom:1px dashed #bbb; }
  .briefs .item b{ display:block; font-size:13px; margin-bottom:2px; }
  .briefs .item .dt{ color:var(--gray); font-size:10.5px; }

  .weather-box{ font-family:"Noto Sans JP",sans-serif; }
  .weather-row{ display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; }
  .weather-row .val{ font-weight:700; }
  .weather-note{ font-size:10.5px; color:var(--gray); margin-top:6px; line-height:1.6; }

  .notice-box{ font-family:"Noto Sans JP",sans-serif; font-size:11.5px; line-height:1.9; color:#333; }
  .notice-box .badge{ display:inline-block; background:var(--ink); color:#fff; font-size:10px; padding:1px 6px; margin-right:6px; }

  .footer-strip{ margin-top:20px; border-top:4px solid var(--ink); padding-top:8px; font-family:"Noto Sans JP",sans-serif;
    font-size:10px; color:#666; display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px; }

  @media (max-width:860px){
    .top-story,.bottom-grid,.column-body,.watch-body{ grid-template-columns:1fr; }
    .title-jp{ font-size:32px; } .headline{ font-size:24px; } .body-cols{ column-count:1; }
    .masthead{ grid-template-columns:1fr; } .masthead-right{ text-align:left; }
  }
</style>
</head>

      リアルタイム自動生成システム<br>

<script>
const IMG = {

};

function jstTodayStr(){
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset()*60000;
  const jst = new Date(utc + 9*3600000);
  const y = jst.getFullYear();
  const m = String(jst.getMonth()+1).padStart(2,'0');
  const d = String(jst.getDate()).padStart(2,'0');
  return `${y}-${m}-${day=String(jst.getDate()).padStart(2,'0')}`;
}

function fmtJP(dateStr){
  const [y,m,d]=dateStr.split('-').map(Number);
  const wd=['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];
  return `${y}年（令和${y-2018}年）${m}月${d}日（${wd}）特別号`;
}

// サンプルデータ（初期表示・エラー時の保険用）
const SEED_EDITION = {

  top: {

    deck: "キーを設定すると、ボタンを押すたびにAIがリアルタイムにニュースを生成します",
    body: [

    ],
    sourceNote: "情報源：安芸太田新聞システム管理",

    ]
  },
  column: {
    title: "複雑な中継を捨てて、原点に立ち返ることの大切さ",
    body: [

    ]

    timeline: [
      ["ステップ1","Google AI Studioで無料のAPIキーを取得"],
      ["ステップ2","上部の入力欄に貼り付ける"]
    ],
    note: "キーを入力後、「新しい記事に書き換える」ボタンを押してください。",
    sourceNote: "安芸太田新聞 編集方針"
  },
  briefs: [
    ["キー入力後に最新スポーツ情報も自動取得","公開されているNPB・Jリーグ等の最新ニュースを検索して要約します。","常時待機"]

function render(data){
  document.getElementById('editionLabel').textContent = fmtJP(data.date) + "";
  document.getElementById('footerDate').textContent = fmtJP(data.date).split('（')[0] + "特別号";

    </div>

    <div class="bottom-grid">
      <div class="briefs"><h3>県内スポーツ短信（日付明記）</h3>${briefsHtml}</div>
      <div class="weather-box">

        <div class="weather-row"><span>天気</span><span class="val">${data.weather.summary}</span></div>

        <div class="weather-row"><span>最低気温</span><span class="val" style="color:#3a6073">${data.weather.low}</span></div>

async function callGeminiDirectly(apiKey, dateStr, theme){
  const sys = `あなたは「安芸太田新聞」というローカル新聞の編集AIです。広島県安芸太田町を中心とした地域紙の${dateStr}朝刊を作成してください。
【絶対厳守】
- Google検索ツールで実際に確認できた事実だけを書く。分からないことは書かない。
- すべての事実に日付を明記する。数日前の話を今日のニュースのように書かない。
- 出力は必ず次のJSON形式のみ。前置きやコードブロック記号は一切付けない。
{
 "date":"${dateStr}",
 "top":{"eyebrow":"","headlineHtml":"","deck":"","body":["",""],"sourceNote":"","photoCap":"","flash":[["",""]]},
 "column":{"title":"","body":["",""]},
 "hazuki":{"heading":"","lead":"","timeline":[["日付","内容"]],"note":"","sourceNote":""},
 "briefs":[["見出し","本文","日付情報"]],
 "weather":{"summary":"","high":"","low":"","uv":"","note":""}
}`;

  // 中継サーバーを完全に排除し、Googleの公式APIURLを直接叩く構造にしました
  const googleUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

  const res = await fetch(googleUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
          contents: [{
              parts: [{ text: `今日の朝刊を作成してください。今回のトップ記事と論説コラムは、特に【${theme}】に焦点を当てて、Google検索を使って最新情報を集めて執筆してください。` }]
          }],
          systemInstruction: {
              parts: [{ text: sys }]
          },
          tools: [{ googleSearch: {} }] // Googleの最新検索機能を使用
      })
  });

  if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Google APIエラー (${res.status}): ${errText}`);
  }

  const data = await res.json();
  const textBlock = data.candidates[0].content.parts[0].text || "";
  const cleaned = textBlock.replace(/```json\n/g, "").replace(/```/g, "").trim();
  const jsonStart = cleaned.indexOf('{');
  const jsonEnd = cleaned.lastIndexOf('}');
  
  if (jsonStart === -1 || jsonEnd === -1) {
      throw new Error("AIの文章から有効なJSONデータを切り出せませんでした。");
  }

  return JSON.parse(cleaned.slice(jsonStart, jsonEnd + 1));
}

async function boot(isUserTriggered){
  const statusBar = document.getElementById('statusBar');
  const statusText = document.getElementById('statusText');
  const apiKeyInput = document.getElementById('apiKeyInput');
  
  // 入力されたキーを取得、無ければ保存されているキーを取得
  let apiKey = apiKeyInput.value.trim();
  if(!apiKey) {
    apiKey = localStorage.getItem('gemini_api_key') || "";
    if(apiKey) apiKeyInput.value = apiKey;
  }

  // キーが全く設定されていない場合は、初期サンプル画面を出して待機する
  if(!apiKey) {
    render(SEED_EDITION);
    statusText.textContent = "上部の入力欄に Gemini の APIキーを入力してください";
    statusBar.classList.remove('loading');
    return;
  }

  // 入力されたキーをブラウザ（PC内）に安全に記憶させる
  localStorage.setItem('gemini_api_key', apiKey);

  const todayStr = jstTodayStr();
  const themes = [
    "安芸太田町の自然と観光（三段峡や恐羅漢山、温井ダムなど）の現在の様子や最新状況",
    "安芸太田町に受け継がれる神楽文化や地元の伝統行事・イベント情報",
    "安芸太田町のローカルグルメ（温井ダムカレー、祇園坊柿、特産品）やお店の話題",
    "安芸太田町の町政・人口減少・移住促進といった地域課題とAI論説委員による鋭い論評",
    "安芸太田町周辺のきょう起きた最新ローカルニュースやお天気情報、防災対策の現状"
  ];
  const selectedTheme = themes[Math.floor(Math.random() * themes.length)];

  statusBar.classList.add('loading');
  statusText.textContent = `【${selectedTheme.split('（')[0].split('や')[0]}】をテーマに直接Google検索でリアルタイム取材中…`;

  try{
    const fresh = await callGeminiDirectly(apiKey, todayStr, selectedTheme);
    render(fresh);
    statusText.textContent = `最新号を表示中（テーマ：${selectedTheme.split('（')[0]}）`;
  } catch(err) {
    console.error(err);
    render(SEED_EDITION);
    statusText.innerHTML = `<span style="color:#d9534f; font-weight:bold;">生成失敗: ${err.message}</span>`;
  }
  statusBar.classList.remove('loading');
}

document.getElementById('regenBtn').addEventListener('click', () => boot(true));

// 初回起動時、すでに保存されたキーがあれば自動実行、無ければ入力待ち
const savedKey = localStorage.getItem('gemini_api_key');
if(savedKey) {
  boot(false);
} else {
  render(SEED_EDITION);
}
</script>
</body>
</html>
